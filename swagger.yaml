        Toggle assignment flow.
        - `false`: admin manual assignment.
        - `true`: auto-assign on survey sketch creation.
      operationId: updateSurveySketchAssignmentFlow
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SurveySketchAssignmentFlowUpdateRequest"
            example:
              autoAssignEnabled: true
      responses:
        "200":
          description: Flow setting updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/SurveySketchAssignmentFlowSetting" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # -------- Admin: Survey Sketch Assignments (assign survey sketch to CAD center) --------
  /api/admin/survey-sketch-assignments:
    post:
      tags: [Admin - Assignments]
      summary: Assign Survey Sketch to CAD Center
      description: |
        Assign a surveyor sketch upload to a CAD center (and optionally to a specific CAD user). Admin/Super Admin only.
        One active assignment per survey sketch; returns 409 if already assigned.
      operationId: createSurveySketchAssignment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SurveySketchAssignmentCreateRequest"
      responses:
        "201":
          description: Assignment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/SurveySketchAssignment" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/admin/survey-sketch-assignments/{assignmentId}:
    parameters:
      - name: assignmentId
        in: path
        required: true
        schema: { type: string }
        description: Assignment ObjectId
    get:
      tags: [Admin - Assignments]
      summary: Get Assignment by ID
      operationId: getSurveySketchAssignment
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Assignment details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/SurveySketchAssignment" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Admin - Assignments]
      summary: Update Assignment
      description: Update status, dueDate, or notes. Admin/Super Admin only. (assignedToUserId commented out for now.)
      operationId: updateSurveySketchAssignment
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SurveySketchAssignmentUpdateRequest"
      responses:
        "200":
          description: Assignment updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/SurveySketchAssignment" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/admin/cad-centers/{cadCenterId}/assignments:
    parameters:
      - name: cadCenterId
        in: path
        required: true
        schema: { type: string }
        description: CAD center ObjectId
    get:
      tags: [Admin - Assignments]
      summary: List Assignments by CAD Center
      description: Get list of survey sketch assignments (drawings) for a CAD center. Admin/Super Admin only.
      operationId: listAssignmentsByCadCenter
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: status
          in: query
          schema:
            type: string
            enum: [ASSIGNED, IN_PROGRESS, COMPLETED, ON_HOLD, CANCELLED]
      responses:
        "200":
          description: List of assignments for this center
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: array, items: { $ref: "#/components/schemas/SurveySketchAssignment" } }
                  pagination: { type: object }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/cad/assignments/{assignmentId}/accept:
    parameters:
      - name: assignmentId
        in: path
        required: true
        schema: { type: string }
        description: Survey sketch assignment ObjectId
    post:
      tags: [CAD - Assignments]
      summary: Accept or reject assignment (CAD)
      description: |
        CAD user accepts or rejects an assigned work. Only assignments with status ASSIGNED can be responded to.
        - **accept** – status → IN_PROGRESS, assignedTo set to the CAD user.
        - **reject** – assignment status → CANCELLED; survey sketch status → PENDING (admin can reassign).
        The CAD user must belong to the same CAD center as the assignment.
      operationId: acceptAssignmentByCad
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [accept, reject]
                  default: accept
                  description: "accept = take the work (IN_PROGRESS); reject = decline (CANCELLED, sketch back to PENDING)"
      responses:
        "200":
          description: Assignment updated (IN_PROGRESS if accepted, CANCELLED if rejected)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/SurveySketchAssignment" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/notifications:
    get:
      tags: [Notifications]
      summary: List Notifications
      description: |
        Get role-based notifications for the logged-in user.
        Admin/Super Admin receive all important flow updates (uploads, assignments, status changes).
      operationId: listNotifications
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: type
          in: query
          schema: { type: string }
        - name: unreadOnly
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Notification feed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Notification" }
                  meta:
                    type: object
                    properties:
                      page: { type: integer, example: 1 }
                      limit: { type: integer, example: 20 }
                      total: { type: integer, example: 100 }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/notifications/{notificationId}:
    parameters:
      - name: notificationId
        in: path
        required: true
        schema: { type: string }
        description: Notification ObjectId
    get:
      tags: [Notifications]
      summary: Get Notification by ID
      operationId: getNotification
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Notification details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/Notification" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/notifications/{notificationId}/read:
    parameters:
      - name: notificationId
        in: path
        required: true
        schema: { type: string }
        description: Notification ObjectId
    post:
      tags: [Notifications]
      summary: Mark Notification as Read
      operationId: markNotificationRead
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Notification marked read
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/Notification" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark All Notifications as Read
      operationId: markAllNotificationsRead
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All notifications marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      message: { type: string, example: All notifications marked as read }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/upload/image:
    post:
      tags: [Upload]
      summary: Get presigned URL for image/document upload
      description: |
        Returns a presigned PUT URL for uploading an image or PDF document to S3 (bucket caddrawing, folder: images).
        **Flow:** Call this API → PUT the file to `uploadUrl` → use `fileUrl` in your payload (e.g. sketch, CAD drawing, PDF document).
        **Auth:** Surveyor, CAD, Admin, Super Admin.
        **Allowed types:** image/jpeg, image/jpg, image/png, image/gif, image/webp, application/pdf. Max 10 MB (enforced client-side or via fileSizeBytes).
      operationId: getImageUploadUrl
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadImageRequest"
            example:
              fileName: "sketch.png"
              contentType: "image/png"
              entityId: "507f1f77bcf86cd799439021"
      responses:
        "200":
          description: Presigned URL for image upload
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message: { type: string }
                      uploadUrl: { type: string, format: uri }
                      fileUrl: { type: string, format: uri }
                      key: { type: string }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/upload/audio:
    post:
      tags: [Upload]
      summary: Get presigned URL for audio upload
      description: |
        Returns a presigned PUT URL for uploading an audio file to S3 (bucket caddrawing).
        **Flow:** Call this API → PUT the audio to `uploadUrl` → use `fileUrl` in your payload (e.g. remarks, voice notes).
        **Auth:** Surveyor, CAD, Admin, Super Admin.
        **Allowed types:** audio/mpeg, audio/mp3, audio/wav, audio/webm, audio/ogg, audio/m4a. Max 25 MB.
      operationId: getAudioUploadUrl
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadAudioRequest"
            example:
              fileName: "remark.mp3"
              contentType: "audio/mpeg"
              entityId: "507f1f77bcf86cd799439021"
      responses:
        "200":
          description: Presigned URL for audio upload
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message: { type: string }
                      uploadUrl: { type: string, format: uri }
                      fileUrl: { type: string, format: uri }
                      key: { type: string }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/upload/delete:
    post:
      tags: [Upload]
      summary: Delete uploaded file
      description: |
        Deletes an image or audio file from S3. Provide either `key` (S3 object key) or `fileUrl` (URL returned from upload).
        **Auth:** Surveyor, CAD, Admin, Super Admin.
      operationId: deleteUpload
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadDeleteRequest"
            example:
              fileUrl: "https://caddrawing.s3.ap-south-1.amazonaws.com/uploads/images/abc/sketch.png"
      responses:
        "200":
          description: File deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      message: { type: string }
                      deleted: { type: boolean }
                      key: { type: string }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /test:
    get:
      tags: [Health]
      summary: Health / Smoke
      description: Service and DB connectivity check.
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                ok: true
                service: cad-backend-api
                stage: dev
                dbConnected: true
                dbName: cad_db

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT from login or register response

  parameters:
    UserId:
      name: userId
      in: path
      required: true
      description: User ObjectId
      schema:
        type: string
        example: "507f1f77bcf86cd799439011"
    DistrictId:
      name: districtId
      in: path
      required: true
      description: District ObjectId
      schema:
        type: string
        example: "507f1f77bcf86cd799439011"
    TalukaId:
      name: talukaId
      in: path
      required: true
      description: Taluka ObjectId
      schema:
        type: string
        example: "507f1f77bcf86cd799439012"
    HobliId:
      name: hobliId
      in: path
      required: true
      description: Hobli ObjectId
      schema:
        type: string
        example: "507f1f77bcf86cd799439013"
    CadCenterId:
      name: cadCenterId
      in: path
      required: true
      description: CAD Center ObjectId
      schema:
        type: string
        example: "507f1f77bcf86cd799439011"
    UploadId:
      name: uploadId
      in: path
      required: true
      description: Surveyor Sketch Upload ObjectId
      schema:
        type: string
        example: "507f1f77bcf86cd799439020"
    Role:
      name: role
      in: path
      required: true
      description: User role (SUPER_ADMIN, ADMIN, CAD, or SURVEYOR)
      schema:
        type: string
        enum: [SUPER_ADMIN, ADMIN, CAD, SURVEYOR]
        example: CAD
    Page:
      name: page
      in: query
      description: Page number (for future list endpoints)
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      description: Items per page (for future list endpoints)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    Search:
      name: search
      in: query
      description: Search query
      schema:
        type: string
        maxLength: 100
    SortBy:
      name: sortBy
      in: query
      description: Sort field
      schema:
        type: string
        default: createdAt
    SortOrder:
      name: sortOrder
      in: query
      description: Sort order
      schema:
        type: string
        enum: [ASC, DESC]
        default: DESC

  schemas:
    SuperAdminRegisterRequest:
      type: object
      required: [firstName, email, password]
      properties:
        firstName:
          type: string
          minLength: 1
          example: John
        lastName:
          type: string
          example: Doe
        email:
          type: string
          format: email
          example: admin@example.com
        password:
          type: string
          format: password
          minLength: 4
          maxLength: 4
          example: "1234"

    SurveyorStartRequest:
      type: object
      required: [phone, firstName]
      properties:
        phone:
          type: string
          example: "9876543210"
        firstName:
          type: string
          minLength: 1
          description: First name of surveyor.
          example: Raj
        lastName:
          type: string
          description: Last name of surveyor (optional).
          example: Kumar

    SurveyorVerifyOtpRequest:
      type: object
      required: [phone, otp]
      properties:
        phone:
          type: string
          example: "9876543210"
        otp:
          type: string
          minLength: 6
          maxLength: 6
          example: "123456"

    SurveyorCompleteRegistrationRequest:
      type: object
      required: [phone, password, district, taluka, category]
      properties:
        phone:
          type: string
          description: Phone number (must match the phone used in OTP verification)
          example: "9876543210"
        password:
          type: string
          format: password
          minLength: 4
          maxLength: 4
          description: Password for login (must be exactly 4 characters)
          example: "1234"
        district:
          type: string
          description: ObjectId of District
          example: "507f1f77bcf86cd799439012"
        taluka:
          type: string
          description: ObjectId of Taluka
          example: "507f1f77bcf86cd799439013"
        category:
          type: string
          enum: [PUBLIC, SURVEYOR]
          example: SURVEYOR
        surveyType:
          type: string
          enum: [LS, GS]
          description: Required when category is SURVEYOR
          example: LS
        firstName:
          type: string
          description: Surveyor first name (optional).
          example: Raj
        lastName:
          type: string
          description: Surveyor last name (optional).
          example: Kumar

    LoginRequest:
      type: object
      required: [password]
      properties:
        email:
          type: string
          format: email
          description: Email for Super Admin / Admin / CAD login
          example: admin@example.com
        phone:
          type: string
          description: Phone for Surveyor login
          example: "9876543210"
        password:
          type: string
          format: password
          description: Password (required for all roles)
          example: "SecureP@ss1"
      oneOf:
        - required: [email, password]
        - required: [phone, password]

    CreateUserRequest:
      type: object
      required: [role, password, firstName]
      properties:
        role:
          type: string
          enum: [ADMIN, CAD, SURVEYOR]
          description: "ADMIN (Super Admin only), CAD or SURVEYOR (Super Admin or Admin)"
        email:
          type: string
          format: email
          description: Required for ADMIN and CAD
          example: admin@example.com
        phone:
          type: string
          description: Required for SURVEYOR
          example: "9876543210"
        password:
          type: string
          format: password
          minLength: 4
          maxLength: 4
          example: "SecureP@ss1"
        firstName:
          type: string
          minLength: 1
          example: Jane
        lastName:
          type: string
          example: Doe
        cadCenter:
          type: string
          description: ObjectId of CAD center; optional when role is CAD (can be set later via patch)
          example: "507f1f77bcf86cd799439012"

    User:
      type: object
      description: User document (auth.password and OTP fields stripped)
      properties:
        _id:
          type: string
          example: "507f1f77bcf86cd799439011"
        role:
          type: string
          enum: [SUPER_ADMIN, ADMIN, CAD, SURVEYOR]
        status:
          type: string
          enum: [ACTIVE, DISABLED, PENDING]
        name:
          type: object
          properties:
            first: { type: string }
            last: { type: string }
        auth:
          type: object
          properties:
            email: { type: string }
            phone: { type: string }
        cadProfile:
          type: object
          nullable: true
        surveyorProfile:
          type: object
          nullable: true
        createdBy:
          type: string
          nullable: true
        deletedAt:
          type: string
          format: date-time
          nullable: true
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    UserPatchRequest:
      type: object
      minProperties: 1
      description: At least one field required. CAD-only cadCenter; Surveyor-only district, taluka, category, surveyType.
      properties:
        firstName:
          type: string
        lastName:
          type: string
        status:
          type: string
          enum: [ACTIVE, DISABLED, PENDING]
        cadCenter:
          type: string
          description: ObjectId; for CAD users only
        district:
          type: string
          description: ObjectId; for Surveyor only
        taluka:
          type: string
          description: ObjectId; for Surveyor only
        category:
          type: string
          enum: [PUBLIC, SURVEYOR]
        surveyType:
          type: string
          enum: [LS, GS]

    DistrictCreateRequest:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          trim: true
          example: "KA-BLR"
        name:
          type: string
          trim: true
          example: "Bengaluru Urban"
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
          default: ACTIVE
    DistrictUpdateRequest:
      type: object
      minProperties: 1
      properties:
        code:
          type: string
          trim: true
        name:
          type: string
          trim: true
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
    TalukaCreateRequest:
      type: object
      required: [code, name, district]
      properties:
        code:
          type: string
          trim: true
          example: "BLR-N"
        name:
          type: string
          trim: true
          example: "Bengaluru North"
        district:
          type: string
          trim: true
          description: District name (case-insensitive match)
          example: "Bengaluru Urban"
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
          default: ACTIVE
    TalukaUpdateRequest:
      type: object
      minProperties: 1
      properties:
        code:
          type: string
          trim: true
        name:
          type: string
          trim: true
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
    HobliCreateRequest:
      type: object
      description: Hobli maps to both District and Taluka. Provide talukaId or taluka (name); districtId/district optional for lookup.
      required: [code, name]
      properties:
        code:
          type: string
          trim: true
          example: "HEBBAL"
        name:
          type: string
          trim: true
          example: "Hebbal"
        talukaId:
          type: string
          description: Taluka ObjectId (preferred)
        taluka:
          type: string
          trim: true
          description: Taluka name (when talukaId not provided; district or districtId recommended)
          example: "Bengaluru North"
        districtId:
          type: string
          description: District ObjectId (optional; used when taluka is by name)
        district:
          type: string
          trim: true
          description: District name (optional for taluka lookup)
          example: "Bengaluru Urban"
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
          default: ACTIVE
    HobliUpdateRequest:
      type: object
      minProperties: 1
      properties:
        code:
          type: string
          trim: true
        name:
          type: string
          trim: true
        status:
          type: string
          enum: [ACTIVE, INACTIVE]

    VillageCreateRequest:
      type: object
      description: Village maps to District, Taluka and Hobli. All three parent IDs required.
      required: [code, name, district, taluka, hobli]
      properties:
