              url: { type: string, format: uri }
              fileName: { type: string, nullable: true }
              mimeType: { type: string, nullable: true }
              size: { type: integer, nullable: true }
              uploadedAt: { type: string, format: date-time, nullable: true }
        others: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Notification:
      type: object
      properties:
        _id: { type: string }
        type: { type: string, example: SURVEY_SKETCH_ASSIGNED }
        title: { type: string, example: Survey sketch assigned }
        message: { type: string }
        entityType: { type: string, nullable: true }
        entityId: { type: string, nullable: true }
        data:
          type: object
          nullable: true
        targetRoles:
          type: array
          items:
            type: string
            enum: [SUPER_ADMIN, ADMIN, CAD, SURVEYOR]
        targetUsers:
          type: array
          items: { type: string }
        isRead:
          type: boolean
          example: false
        readAt:
          type: string
          format: date-time
          nullable: true
        createdBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MasterSuccessResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          description: District, Taluka, or Hobli document
    MasterListResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object

    AuthSuccessResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required: [user, token]
          properties:
            user:
              type: object
              description: User document (auth secrets stripped)
            token:
              type: string
              description: JWT for Authorization header

    MessageResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            message:
              type: string
              example: OTP sent successfully

    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        service:
          type: string
          example: cad-backend-api
        stage:
          type: string
          example: dev
        dbConnected:
          type: boolean
        dbName:
          type: string

    ErrorResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validation failed
        code:
          type: string
          example: BAD_REQUEST
        errors:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }

  responses:
    BadRequest:
      description: Bad request (validation or business rule)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: Missing required fields
            code: BAD_REQUEST
            errors:
              - field: email
                message: Required

    Unauthorized:
      description: Unauthorized (invalid or missing token / credentials)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: Invalid credentials
            code: UNAUTHORIZED

    Forbidden:
      description: Forbidden (valid token but insufficient role)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: You do not have permission to perform this action
            code: FORBIDDEN

    NotFound:
      description: Resource not found (e.g. district/taluka/hobli or parent)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: District not found
            code: NOT_FOUND

    Conflict:
      description: Conflict (e.g. email already registered)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: Email already registered
            code: CONFLICT
