    SurveyorSketchUploadCreateRequest:
      type: object
      required: [surveyType, district, taluka, hobli, village, surveyNo, singleUpload]
      description: |
        singleUpload is required (URL string or object with url, fileName, mimeType, size).
        Media document fields are optional: moolaTippani, hissaTippani, atlas, rrPakkabook, kharabu.
        Optional: audio (single audio file), other_documents (array of extra files, e.g. PDFs or images), others (text notes, max 2000 chars).
      properties:
        surveyType:
          type: string
          enum: [joint_flat, single_flat]
          description: Type of flat (joint or single)
          example: single_flat
        district:
          type: string
          description: ObjectId of District
          example: "507f1f77bcf86cd799439012"
        taluka:
          type: string
          description: ObjectId of Taluka
          example: "507f1f77bcf86cd799439013"
        hobli:
          type: string
          description: ObjectId of Hobli
          example: "507f1f77bcf86cd799439014"
        village:
          type: string
          description: ObjectId of Village
          example: "507f1f77bcf86cd799439015"
        surveyNo:
          type: string
          minLength: 1
          description: Survey number
          example: "123"
        singleUpload:
          oneOf:
            - type: string
              format: uri
              description: Document URL
            - type: object
              properties:
                url: { type: string, format: uri }
                fileName: { type: string }
                mimeType: { type: string }
                size: { type: integer, minimum: 0 }
          description: Required single upload file (URL or document object)
        moolaTippani:
          oneOf:
            - type: string
              format: uri
              description: Document URL
            - type: object
              properties:
                url: { type: string, format: uri }
                fileName: { type: string }
                mimeType: { type: string }
                size: { type: integer, minimum: 0 }
          description: Moola Tippani document (optional)
        hissaTippani:
          oneOf:
            - type: string
              format: uri
              description: Document URL
            - type: object
              properties:
                url: { type: string, format: uri }
                fileName: { type: string }
                mimeType: { type: string }
                size: { type: integer, minimum: 0 }
          description: Hissa Tippani document (optional)
        atlas:
          oneOf:
            - type: string
              format: uri
              description: Document URL
            - type: object
              properties:
                url: { type: string, format: uri }
                fileName: { type: string }
                mimeType: { type: string }
                size: { type: integer, minimum: 0 }
          description: Atlas document (optional)
        rrPakkabook:
          oneOf:
            - type: string
              format: uri
              description: Document URL
            - type: object
              properties:
                url: { type: string, format: uri }
                fileName: { type: string }
                mimeType: { type: string }
                size: { type: integer, minimum: 0 }
          description: RR Pakkabook document (optional)
        kharabu:
          oneOf:
            - type: string
              format: uri
              description: Document URL
            - type: object
              properties:
                url: { type: string, format: uri }
                fileName: { type: string }
                mimeType: { type: string }
                size: { type: integer, minimum: 0 }
          description: Kharabu document (optional)
        audio:
          oneOf:
            - type: string
              format: uri
              description: Audio file URL (e.g. audio remarks, voice notes)
            - type: object
              properties:
                url: { type: string, format: uri }
                fileName: { type: string }
                mimeType: { type: string, description: "e.g. audio/mpeg, audio/wav" }
                size: { type: integer, minimum: 0 }
                uploadedAt: { type: string, format: date-time }
          description: Optional audio file (single file). Can be a URL string or object with url, fileName, mimeType, size, uploadedAt.
        other_documents:
          type: array
          maxItems: 20
          description: Optional extra documents (e.g. additional PDFs, images). Each item is a URL string or object with url, fileName, mimeType, size, uploadedAt.
          items:
            oneOf:
              - type: string
                format: uri
                description: File URL
              - type: object
                properties:
                  url: { type: string, format: uri }
                  fileName: { type: string }
                  mimeType: { type: string, description: "e.g. application/pdf, audio/mpeg" }
                  size: { type: integer, minimum: 0 }
                  uploadedAt: { type: string, format: date-time }
        others:
          type: string
          maxLength: 2000
          description: Optional text notes (e.g. "If joint flat, provide all survey no. details"). Not for file URLs; use other_documents for audio/extra files.
          example: "If joint flat, provide all survey no. details"
        is_originaltippani:
          type: boolean
          default: false
          description: "Indicates original tippani is included. Auto-set to true when moolaTippani document is uploaded separately."
        is_hissatippani:
          type: boolean
          default: false
          description: "Indicates hissa tippani is included. Auto-set to true when hissaTippani document is uploaded separately."
        is_atlas:
          type: boolean
          default: false
          description: "Indicates atlas is included. Auto-set to true when atlas document is uploaded separately."
        is_rrpakkabook:
          type: boolean
          default: false
          description: "Indicates RR pakka book is included. Auto-set to true when rrPakkabook document is uploaded separately."
        is_akarabandu:
          type: boolean
          default: false
          description: "Indicates akarabandu is included. Sent by user when using singleUpload."
        is_kharabuttar:
          type: boolean
          default: false
          description: "Indicates kharabu / kharabuttar is included. Auto-set to true when kharabu document is uploaded separately."
        is_mulapatra:
          type: boolean
          default: false
          description: "Indicates mulapatra is included. Sent by user when using singleUpload."

