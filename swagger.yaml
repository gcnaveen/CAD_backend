        fileUrl:
          type: string
          format: uri
          description: Public URL of the file (from upload response data.fileUrl)

    SurveyorSketchUpload:
      type: object
      description: Surveyor sketch upload document
      properties:
        _id:
          type: string
          example: "507f1f77bcf86cd799439020"
        applicationId:
          type: string
          description: Auto-generated application ID in format DISTRICT_CODE/TALUKA_CODE/YY/N
          example: "KA-BLR/BLR-N/26/1"
        surveyor:
          oneOf:
            - type: string
              description: ObjectId when not populated
            - type: object
              description: User object when populated
              properties:
                _id: { type: string }
                name: { type: object }
                role: { type: string }
        surveyType:
          type: string
          enum: [joint_flat, single_flat]
        district:
          oneOf:
            - type: string
              description: ObjectId when not populated
            - type: object
              description: District object when populated
              properties:
                _id: { type: string }
                code: { type: string }
                name: { type: string }
        taluka:
          oneOf:
            - type: string
              description: ObjectId when not populated
            - type: object
              description: Taluka object when populated
              properties:
                _id: { type: string }
                code: { type: string }
                name: { type: string }
        hobli:
          oneOf:
            - type: string
              description: ObjectId when not populated
            - type: object
              description: Hobli object when populated
              properties:
                _id: { type: string }
                code: { type: string }
                name: { type: string }
        village:
          oneOf:
            - type: string
              description: ObjectId when not populated
            - type: object
              description: Village object when populated
              properties:
                _id: { type: string }
                code: { type: string }
                name: { type: string }
        surveyNo:
          type: string
        documents:
          type: object
          description: Map of document keys to document objects
          additionalProperties:
            type: object
            properties:
              url:
                type: string
                format: uri
              fileName:
                type: string
                nullable: true
              mimeType:
                type: string
                nullable: true
              size:
                type: integer
                nullable: true
              uploadedAt:
                type: string
                format: date-time
        singleUpload:
          type: object
          description: Required single upload file
          properties:
            url: { type: string, format: uri }
            fileName: { type: string, nullable: true }
            mimeType: { type: string, nullable: true }
            size: { type: integer, nullable: true }
            uploadedAt: { type: string, format: date-time, nullable: true }
        audio:
          type: object
          nullable: true
          description: Optional audio file (single file)
          properties:
            url: { type: string, format: uri }
            fileName: { type: string, nullable: true }
            mimeType: { type: string, nullable: true }
            size: { type: integer, nullable: true }
            uploadedAt: { type: string, format: date-time, nullable: true }
        other_documents:
          type: array
          description: Optional extra documents (additional PDFs, images, etc.)
          items:
            type: object
            properties:
              url: { type: string, format: uri }
              fileName: { type: string, nullable: true }
              mimeType: { type: string, nullable: true }
              size: { type: integer, nullable: true }
              uploadedAt: { type: string, format: date-time, nullable: true }
        others:
          type: string
          nullable: true
          maxLength: 2000
          description: Optional text notes (not file URLs)
        is_originaltippani:
